version: '3'

vars:
  ENV_FILES:
    sh: find . -name '.env' -not -path './node_modules/*' -not -name '*.example' -not -name '*.enc'

tasks:
  encrypt:
    desc: Encrypt all .env files using SOPS with age
    cmds:
      - for: { var: ENV_FILES, split: "\n" }
        cmd: |
          if [ -f "{{.ITEM}}" ]; then
            echo "Encrypting {{.ITEM}} -> {{.ITEM}}.enc"
            sops --encrypt "{{.ITEM}}" > "{{.ITEM}}.enc"
          fi
    silent: false

  decrypt:
    desc: Decrypt all .env.enc files using SOPS with age
    cmds:
      - |
        for f in $(find . -name '.env.enc' -not -path './node_modules/*'); do
          target="${f%.enc}"
          echo "Decrypting $f -> $target"
          sops --decrypt "$f" > "$target"
        done
    silent: false

  encrypt:file:
    desc: Encrypt a specific .env file
    requires:
      vars: [FILE]
    cmds:
      - echo "Encrypting {{.FILE}} -> {{.FILE}}.enc"
      - sops --encrypt "{{.FILE}}" > "{{.FILE}}.enc"

  decrypt:file:
    desc: Decrypt a specific .env.enc file
    requires:
      vars: [FILE]
    cmds:
      - echo "Decrypting {{.FILE}} -> ${FILE%.enc}"
      - sops --decrypt "{{.FILE}}" > "{{.FILE | replace \".enc\" \"\"}}"

  list:env:
    desc: List all .env files that would be encrypted
    cmds:
      - find . -name '.env' -not -path './node_modules/*' -not -name '*.example' -not -name '*.enc'

  list:encrypted:
    desc: List all encrypted .env.enc files
    cmds:
      - find . -name '.env.enc' -not -path './node_modules/*'

  # Development tasks
  dev:
    desc: Start all services (daemon, agent, web) concurrently
    deps:
      - dev:daemon
      - dev:agent
      - dev:web

  dev:daemon:
    desc: Start terminal-host daemon
    dir: packages/terminal-host
    cmds:
      - bun run dev

  dev:daemon:demo:
    desc: Start terminal-host daemon in demo mode (terminals without claude commands)
    dir: packages/terminal-host
    env:
      DEMO_MODE: "true"
    cmds:
      - bun run dev

  dev:agent:
    desc: Start voice-agent (backend)
    dir: packages/voice-agent
    env:
      SKIP_STATIC_SERVER: "true"
      TRANSPORT_MODE: web
    cmds:
      - bun run dev

  dev:web:
    desc: Start web-ui frontend (Bun dev server)
    dir: packages/web-ui
    cmds:
      - bun run dev

  tui:inspect:
    desc: Start voice inspector TUI
    dir: packages/voice-agent
    cmds:
      - bun run tui:inspect
